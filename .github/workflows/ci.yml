name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm nuxt build
        env:
          NITRO_PRESET: node-server
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder-key
          NUXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NUXT_PUBLIC_SUPABASE_KEY: placeholder-key
          SUPABASE_SECRET_KEY: placeholder-secret-key
          R2_ACCOUNT_ID: placeholder
          R2_ACCESS_KEY_ID: placeholder
          R2_SECRET_ACCESS_KEY: placeholder
          R2_BUCKET_NAME: placeholder
          R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
          SENTRY_DSN: ''